version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: chizhevsky-timescaledb
    environment:
      - POSTGRES_USER=chizhevsky_admin
      - POSTGRES_PASSWORD=cosmic_radiation_secret_2026
      - POSTGRES_DB=chizhevsky_intelligence
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - chizhevsky-network

  frontend:
    image: node:20-alpine
    container_name: chizhevsky-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_ENABLE_MOCK_DATA=true
    networks:
      - chizhevsky-network

volumes:
  timescaledb_data:

networks:
  chizhevsky-network:
    driver: bridge
